spring.datasource.driver-class-name=org.postgresql.Driver
tiedotuspalvelu.oppija-origin=http://localhost:8080
tiedotuspalvelu.virkailija-origin=http://localhost:8080
tiedotuspalvelu.api-base-url=http://localhost:8080

# OAuth2 client credentials
tiedotuspalvelu.otuva.oauth2-client-id=tiedotuspalvelu
tiedotuspalvelu.otuva.oauth2-client-secret=tiedotuspalvelu

# Otuva cas fakes
tiedotuspalvelu.cas-oppija.server-url=http://localhost:8888/realms/cas-oppija/protocol/cas
tiedotuspalvelu.cas-oppija.service-base-url=${tiedotuspalvelu.oppija-origin}/omat-viestit
tiedotuspalvelu.cas-virkailija.server-url=http://localhost:8888/realms/cas-virkailija/protocol/cas
tiedotuspalvelu.cas-virkailija.service-base-url=${tiedotuspalvelu.virkailija-origin}/tiedotuspalvelu
# Otuva OAuth2 fake
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8888/realms/otuva-oauth2/protocol/openid-connect/certs
tiedotuspalvelu.otuva.oauth2-token-url=http://localhost:8888/realms/otuva-oauth2/protocol/openid-connect/token
tiedotuspalvelu.swagger-ui.oauth2-token-url=http://localhost:8888/realms/otuva-oauth2/protocol/openid-connect/token

# Springdoc
springdoc.swagger-ui.path=/omat-viestit/swagger-ui
springdoc.api-docs.path=/omat-viestit/v3/api-docs