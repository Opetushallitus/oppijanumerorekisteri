server.port=8085

spring.datasource.url=jdbc:postgresql://localhost:5436/tiedotuspalvelu
spring.datasource.username=tiedotuspalvelu
spring.datasource.password=tiedotuspalvelu

tiedotuspalvelu.base-url=http://localhost:8086
tiedotuspalvelu.api-base-url=http://localhost:8086
tiedotuspalvelu.opintopolku-host=testiopintopolku.fi
tiedotuspalvelu.fetch-localisations.enabled=false

# Keycloak for local OAuth2
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8888/realms/tiedotuspalvelu/protocol/openid-connect/certs
tiedotuspalvelu.otuva.oauth2-token-url=http://localhost:8888/realms/tiedotuspalvelu/protocol/openid-connect/token
tiedotuspalvelu.otuva.oauth2-client-id=kielitutkinnosta-tiedottaja
tiedotuspalvelu.otuva.oauth2-client-secret=kielitutkinnosta-tiedottaja
tiedotuspalvelu.swagger-ui.oauth2-token-url=http://localhost:8888/realms/tiedotuspalvelu/protocol/openid-connect/token

# Prefill Swagger UI OAuth2 dialog
springdoc.swagger-ui.oauth.client-id=kielitutkinnosta-tiedottaja
springdoc.swagger-ui.oauth.client-secret=kielitutkinnosta-tiedottaja
