management.endpoints.web.base-path=/omat-viestit/actuator
spring.jpa.hibernate.ddl-auto=none
spring.flyway.baseline-on-migrate=true
server.port=8080
server.servlet.context-path=/
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.driver-class-name=org.postgresql.Driver
spring.session.jdbc.table-name=spring_session
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://example.com/.well-known/jwks.json
spring.flyway.enabled=true
spring.flyway.table=flyway_schema_history
spring.flyway.locations=classpath:db/migration
tiedotuspalvelu.cas-oppija.server-url=https://${tiedotuspalvelu.opintopolku-host}/cas-oppija
tiedotuspalvelu.cas-oppija.service-base-url=${tiedotuspalvelu.oppija-origin}/omat-viestit
tiedotuspalvelu.cas-virkailija.server-url=https://virkailija.${tiedotuspalvelu.opintopolku-host}/cas
tiedotuspalvelu.cas-virkailija.service-base-url=${tiedotuspalvelu.virkailija-origin}/tiedotuspalvelu
tiedotuspalvelu.fetch-kielitutkintotodistus.enabled=false
tiedotuspalvelu.fetch-oppija.enabled=false
tiedotuspalvelu.fetch-localisations.enabled=true
tiedotuspalvelu.suomifi-viestit.enabled=false
tiedotuspalvelu.suomifi-viestit.base-url=http://localhost

# Springdoc
springdoc.swagger-ui.path=/omat-viestit/swagger-ui
springdoc.api-docs.path=/omat-viestit/v3/api-docs
