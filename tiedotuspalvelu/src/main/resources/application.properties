spring.jpa.hibernate.ddl-auto=none
spring.flyway.baseline-on-migrate=true
server.port=8080
server.servlet.context-path=/omat-viestit
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.driver-class-name=org.postgresql.Driver
spring.session.jdbc.table-name=spring_session
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://example.com/.well-known/jwks.json
spring.flyway.enabled=true
spring.flyway.table=flyway_schema_history
spring.flyway.locations=classpath:db/migration
tiedotuspalvelu.cas.server-url=https://${tiedotuspalvelu.opintopolku-host}/cas-oppija
tiedotuspalvelu.cas.service-base-url=${tiedotuspalvelu.base-url}${server.servlet.context-path}
tiedotuspalvelu.fetch-oppija.enabled=false
tiedotuspalvelu.fetch-localisations.enabled=true
tiedotuspalvelu.suomifi-viestit.enabled=false
tiedotuspalvelu.suomifi-viestit.base-url=http://localhost
tiedotuspalvelu.suomifi-viestit.username=username
tiedotuspalvelu.suomifi-viestit.password=password
tiedotuspalvelu.suomifi-viestit.sender-service-id=sender-service-id
tiedotuspalvelu.suomifi-viestit.posti.username=posti-username
tiedotuspalvelu.suomifi-viestit.posti.password=posti-password
tiedotuspalvelu.suomifi-viestit.posti.contact-email=noreply@example.com
tiedotuspalvelu.suomifi-viestit.sender-address.name=Sender Name
tiedotuspalvelu.suomifi-viestit.sender-address.street-address=Sender Street Address
tiedotuspalvelu.suomifi-viestit.sender-address.zip-code=00000
tiedotuspalvelu.suomifi-viestit.sender-address.city=Sender City
tiedotuspalvelu.suomifi-viestit.sender-address.country-code=FI
tiedotuspalvelu.oauth2.client-id=client-id
tiedotuspalvelu.oauth2.client-secret=client-secret
tiedotuspalvelu.oauth2.token-url=https://example.com/oauth2/token
