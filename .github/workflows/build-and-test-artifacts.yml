name: Build and test artifacts
on:
  push:
    branches: [ master ]
  pull_request:
  merge_group:

jobs:
  run-code-format-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: ./scripts/ci/run-code-format-checks.sh
  run-henkilo-ui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: ./scripts/ci/run-henkilo-ui-tests.sh
  run-oppijanumerorekisteri-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: 'corretto'
          java-version: '21'
      - run: ./scripts/ci/run-oppijanumerorekisteri-tests.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
